<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>岳沐藝文 收款資料後台</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f3; color: #1a1a1a; font-size: 15px; }
  .container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 1.5rem; }
  .card { background: #fff; border-radius: 12px; border: 0.5px solid #e0e0dc; padding: 1.25rem; }
  input { width: 100%; padding: 8px 10px; border: 0.5px solid #ccc; border-radius: 8px; font-size: 14px; font-family: inherit; background: #fff; color: #1a1a1a; }
  input:focus { outline: none; border-color: #888; box-shadow: 0 0 0 2px rgba(0,0,0,0.06); }
  .btn { padding: 8px 16px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #1a1a1a; font-size: 13px; cursor: pointer; font-family: inherit; }
  .btn:hover { background: #f5f5f3; }
  .btn-primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .btn-primary:hover { opacity: .85; }
  .section-title { font-size: 11px; font-weight: 500; color: #888; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 8px; }
  .member-item { padding: 10px 14px; border-radius: 8px; border: 0.5px solid #e0e0dc; background: #fff; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: border-color .15s; margin-bottom: 6px; }
  .member-item:hover { border-color: #888; }
  .member-item.selected { border-color: #1a1a1a; background: #f5f5f3; }
  .detail-account { background: #f5f5f3; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
  .copy-btn { padding: 4px 10px; border-radius: 6px; border: 0.5px solid #ccc; background: #fff; color: #555; font-size: 12px; cursor: pointer; font-family: inherit; transition: all .15s; margin-left: auto; flex-shrink: 0; }
  .copy-btn:hover { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .copy-btn.copied { background: #EAF3DE; color: #3B6D11; border-color: #3B6D11; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 100px; font-size: 11px; background: #E6F1FB; color: #185FA5; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 100px; font-size: 11px; margin-left: 6px; background: #EAF3DE; color: #3B6D11; }
  .error-box { background: #FCEBEB; color: #A32D2D; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 1rem; line-height: 1.6; }
  .count-badge { font-size: 11px; background: #f5f5f3; border: 0.5px solid #e0e0dc; border-radius: 100px; padding: 2px 8px; color: #888; }
  .split { display: grid; grid-template-columns: 210px 1fr; gap: 1.5rem; margin-top: 1rem; }
  .detail-panel { background: #fff; border: 0.5px solid #e0e0dc; border-radius: 12px; padding: 1.25rem; }
  .empty { text-align: center; padding: 2rem; color: #888; font-size: 14px; line-height: 1.8; }
  .loading { text-align: center; padding: 2rem; color: #888; font-size: 13px; }
  .avatar { width: 40px; height: 40px; border-radius: 50%; background: #E6F1FB; display: flex; align-items: center; justify-content: center; font-weight: 500; font-size: 16px; color: #185FA5; flex-shrink: 0; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .api-row { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 1rem; }
  .api-row > div { flex: 1; }
  label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; }
  @media(max-width:600px){ .split { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <h1>岳沐藝文｜收款資料後台</h1>
    <button class="btn" onclick="loadData()">↺ 重新整理</button>
  </div>

  <div class="card" style="margin-bottom:1rem">
    <div class="api-row">
      <div>
        <label>Apps Script 網址</label>
        <input type="text" id="api-url" placeholder="https://script.google.com/macros/s/...">
      </div>
      <button class="btn btn-primary" onclick="saveAndLoad()">載入</button>
    </div>
    <div style="font-size:12px;color:#888">網址會記憶在瀏覽器，下次開啟不需重填</div>
  </div>

  <div id="error-area"></div>
  <div id="loading-area" class="loading" style="display:none">資料載入中…</div>

  <div id="main" style="display:none">
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
      <input type="text" id="search" placeholder="搜尋姓名…" oninput="filterMembers()" style="max-width:220px">
      <span class="count-badge" id="count"></span>
    </div>
    <div class="split">
      <div>
        <div class="section-title">成員列表</div>
        <div id="member-list"></div>
      </div>
      <div>
        <div id="detail-area">
          <div class="empty" style="padding-top:3rem">點選左側成員<br>查看帳戶資訊</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const DEFAULT_URL = 'https://script.google.com/macros/s/AKfycbw_Eg159fzSCUa1kA0TfW0HbbPjU9QKR0KDUUJMWOAS8PT8-vjtHOsuWXJOO30eOhCN/exec';
let allMembers = [];
let filteredMembers = [];

function parseBankCode(bankStr) {
  if (!bankStr) return { code: '', name: '' };
  const m = String(bankStr).match(/^(\d{3})\s+(.+)/);
  if (m) return { code: m[1], name: m[2] };
  return { code: '', name: String(bankStr) };
}

function getUrl() {
  return localStorage.getItem('appsScriptUrl') || DEFAULT_URL;
}

function saveAndLoad() {
  const url = document.getElementById('api-url').value.trim();
  if (url) localStorage.setItem('appsScriptUrl', url);
  loadData();
}

async function loadData() {
  const url = getUrl();
  document.getElementById('api-url').value = url;
  document.getElementById('error-area').innerHTML = '';
  document.getElementById('loading-area').style.display = 'block';
  document.getElementById('main').style.display = 'none';
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    allMembers = data.map(m => ({
      name: m.name,
      accounts: (m.accounts || []).map(a => {
        const { code, name: bankName } = parseBankCode(a.bank);
        return { bankCode: code, bankName, branch: a.branch || '', acctno: a.acctno || '' };
      })
    }));
    filteredMembers = [...allMembers];
    document.getElementById('loading-area').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    renderList();
  } catch(e) {
    document.getElementById('loading-area').style.display = 'none';
    document.getElementById('error-area').innerHTML = `<div class="error-box">載入失敗：${e.message}<br><span style="font-size:12px">請確認 Apps Script 已部署且設為「所有人可存取」</span></div>`;
  }
}

function filterMembers() {
  const q = document.getElementById('search').value.toLowerCase();
  filteredMembers = allMembers.filter(m => m.name.toLowerCase().includes(q));
  renderList();
}

function renderList() {
  const el = document.getElementById('member-list');
  document.getElementById('count').textContent = `共 ${filteredMembers.length} 人`;
  if (!filteredMembers.length) { el.innerHTML = '<div class="empty">無符合成員</div>'; return; }
  el.innerHTML = filteredMembers.map((m,i) => `
    <div class="member-item" onclick="showDetail(${i},this)">
      <span>${m.name}</span>
      <span style="font-size:12px;color:#888">${m.accounts.length} 個</span>
    </div>`).join('');
}

function showDetail(i, el) {
  document.querySelectorAll('.member-item').forEach(x => x.classList.remove('selected'));
  el.classList.add('selected');
  const m = filteredMembers[i];
  document.getElementById('detail-area').innerHTML = `
    <div class="detail-panel">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <div class="avatar">${m.name[0]}</div>
        <div>
          <div style="font-size:16px;font-weight:500">${m.name}</div>
          <div style="font-size:12px;color:#888">${m.accounts.length} 個收款帳號</div>
        </div>
      </div>
      <div class="section-title">收款帳號</div>
      ${m.accounts.map((a, ai) => `
        <div class="detail-account">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap">
            <span style="font-weight:500;font-size:14px">${a.bankName || '—'}</span>
            ${a.bankCode ? `<span class="badge">${a.bankCode}</span>` : ''}
            ${a.branch ? `<span class="tag">${a.branch}</span>` : ''}
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div style="font-size:15px;font-family:ui-monospace,monospace;letter-spacing:.05em;flex:1">${a.acctno || '—'}</div>
            <button class="copy-btn" id="copy-btn-${i}-${ai}" onclick="copyAcctno('${a.acctno}', '${i}-${ai}')">複製</button>
          </div>
        </div>`).join('')}
    </div>`;
}

function copyAcctno(acctno, id) {
  navigator.clipboard.writeText(acctno).then(() => {
    const btn = document.getElementById('copy-btn-' + id);
    if (!btn) return;
    btn.textContent = '已複製！';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '複製'; btn.classList.remove('copied'); }, 2000);
  });
}

// 初始化
document.getElementById('api-url').value = getUrl();
loadData();
</script>
</body>
</html>
